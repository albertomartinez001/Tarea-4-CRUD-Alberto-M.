{% extends "base.html" %}

{% block content %}

<div class="container">

<div class="d-flex justify-content-between mb-3">

<h2>Cursos</h2>

<a href="{% url 'alumno:curso_create' %}" class="btn btn-primary">
Nuevo Curso
</a>

</div>

<table class="table table-bordered">

<thead>

<tr>
<th>Nombre</th>
<th>Descripción</th>
<th>Acciones</th>
</tr>

</thead>

<tbody>

{% for curso in cursos %}

<tr>

<td>{{ curso.nombre }}</td>

<td>{{ curso.descripcion }}</td>

<td>

<a href="{% url 'alumno:curso_update' curso.id %}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="{% url 'alumno:curso_delete' curso.id %}" class="btn btn-danger btn-sm">
Eliminar
</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="3">No hay cursos registrados</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
