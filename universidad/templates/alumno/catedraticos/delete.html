{% extends "base.html" %}

{% block content %}

<div class="container">

<h2>Eliminar Catedrático</h2>

<div class="alert alert-danger">

¿Seguro que deseas eliminar a:

<strong>{{ catedratico.nombre }}</strong> ?

</div>

<form method="POST">

{% csrf_token %}

<button class="btn btn-danger">
Eliminar
</button>

<a href="{% url 'alumno:catedraticos' %}" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

{% endblock %}
