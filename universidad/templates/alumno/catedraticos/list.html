{% extends "base.html" %}

{% block content %}

<div class="container">

<div class="d-flex justify-content-between mb-3">

<h2>Catedráticos</h2>

<a href="{% url 'alumno:catedratico_create' %}" class="btn btn-primary">
Nuevo Catedrático
</a>

</div>

<table class="table table-bordered">

<thead>

<tr>
<th>Nombre</th>
<th>Email</th>
<th>Acciones</th>
</tr>

</thead>

<tbody>

{% for catedratico in catedraticos %}

<tr>

<td>{{ catedratico.nombre }}</td>

<td>{{ catedratico.email }}</td>

<td>

<a href="{% url 'alumno:catedratico_update' catedratico.id %}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="{% url 'alumno:catedratico_delete' catedratico.id %}" class="btn btn-danger btn-sm">
Eliminar
</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="3">No hay catedráticos registrados</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
