{% extends "base.html" %}

{% block content %}

<div class="container">

<h2>Nueva Nota</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Alumno</label>

<select name="alumno" class="form-control">

{% for alumno in alumnos %}
<option value="{{ alumno.id }}">{{ alumno }}</option>
{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Asignación</label>

<select name="asignacion" class="form-control">

{% for asignacion in asignaciones %}
<option value="{{ asignacion.id }}">{{ asignacion }}</option>
{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Nota</label>

<input type="number" step="0.01" name="nota" class="form-control">

</div>

<button class="btn btn-primary">
Guardar
</button>

<a href="{% url 'alumno:calificaciones' %}" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

{% endblock %}
