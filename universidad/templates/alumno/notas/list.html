{% extends "base.html" %}

{% block content %}

<div class="container">

<div class="d-flex justify-content-between mb-3">

<h2>Calificaciones</h2>

<a href="{% url 'alumno:nota_create' %}" class="btn btn-primary">
Nueva Nota
</a>

</div>

<table class="table table-bordered">

<thead>
<tr>
<th>Alumno</th>
<th>Asignación</th>
<th>Nota</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for nota in notas %}

<tr>

<td>{{ nota.alumno }}</td>

<td>{{ nota.asignacion }}</td>

<td>{{ nota.nota }}</td>

<td>

<a href="{% url 'alumno:nota_update' nota.id %}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="{% url 'alumno:nota_delete' nota.id %}" class="btn btn-danger btn-sm">
Eliminar
</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="4">No hay notas registradas</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
