{% extends "base.html" %}

{% block content %}

<div class="container">

<h2>Editar Nota</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Alumno</label>

<select name="alumno" class="form-control">

{% for alumno in alumnos %}

<option value="{{ alumno.id }}" {% if alumno.id == nota.alumno.id %}selected{% endif %}>
{{ alumno }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Asignación</label>

<select name="asignacion" class="form-control">

{% for asignacion in asignaciones %}

<option value="{{ asignacion.id }}" {% if asignacion.id == nota.asignacion.id %}selected{% endif %}>
{{ asignacion }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Nota</label>

<input type="number" step="0.01" name="nota" value="{{ nota.nota }}" class="form-control">

</div>

<button class="btn btn-warning">
Actualizar
</button>

<a href="{% url 'alumno:calificaciones' %}" class="btn btn-secondary">
Cancelar
</a>

</form>

</div>

{% endblock %}
